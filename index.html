<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mathe-Shooter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      margin: auto;
    }
  </style>
</head>
<body>
  <!-- Phaser 3 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- Utils -->
  <script src="utils/Constants.js"></script>
  <script src="utils/GraphicsFactory.js"></script>

  <!-- Data -->
  <script src="data/strings.js"></script>
  <script src="data/weapons.js"></script>
  <script src="data/levels.js"></script>

  <!-- Systems -->
  <script src="systems/ProfileSystem.js"></script>
  <script src="systems/MathSystem.js"></script>
  <script src="systems/InventorySystem.js"></script>
  <script src="systems/LevelManager.js"></script>
  <script src="systems/AudioSystem.js"></script>

  <!-- Objects -->
  <script src="objects/Platform.js"></script>
  <script src="objects/Checkpoint.js"></script>
  <script src="objects/Bullet.js"></script>
  <script src="objects/WeaponItem.js"></script>
  <script src="objects/ShieldItem.js"></script>
  <script src="objects/MathChest.js"></script>
  <script src="objects/Enemy.js"></script>
  <script src="objects/BasicEnemy.js"></script>
  <script src="objects/StrongEnemy.js"></script>
  <script src="objects/Boss.js"></script>
  <script src="objects/Player.js"></script>

  <script src="scenes/HomeScene.js"></script>
  <script src="scenes/BootScene.js"></script>
  <script src="scenes/ProfileScene.js"></script>
  <script src="scenes/MenuScene.js"></script>
  <script src="scenes/GameScene.js"></script>
  <script src="scenes/HUDScene.js"></script>
  <script src="scenes/MathScene.js"></script>
  <script src="scenes/LevelCompleteScene.js"></script>
  
  <script src="scenes/CreditsScene.js"></script>
  <script src="scenes/GameOverScene.js"></script>

  <!-- Main game entry point -->
  <script src="game.js"></script>
</body>
</html>
